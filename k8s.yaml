apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraw-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scraw-gateway
  template:
    metadata:
      labels:
        app: scraw-gateway
    spec:
      containers:
      - name: gateway
        image: scraw-gateway:latest
        ports:
        - containerPort: 8080
        - containerPort: 8081
        env:
        - name: PORT
          value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  selector:
    app: scraw-gateway
  ports:
    - name: websocket
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: commit
      protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: scraw-replica
spec:
  serviceName: "replica-service"
  replicas: 3
  selector:
    matchLabels:
      app: scraw-replica
  template:
    metadata:
      labels:
        app: scraw-replica
    spec:
      containers:
      - name: replica
        image: scraw-replica:latest
        ports:
        - containerPort: 3001
          name: replica-port
        env:
        - name: REPLICA_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: PORT
          value: "3001"
        - name: PEERS
          value: "scraw-replica-0.replica-service:3001,scraw-replica-1.replica-service:3001,scraw-replica-2.replica-service:3001"
        - name: GATEWAY_URL
          value: "http://gateway-service:8081"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /status
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: replica-service
spec:
  clusterIP: None
  selector:
    app: scraw-replica
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scraw-ingress
  annotations:
    nginx.ingress.kubernetes.io/websocket-services: "gateway-service"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
  - host: scraw.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port: 
              number: 8080
